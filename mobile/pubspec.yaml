name: doctor_appointment_mobile
description: MediBook - Healthcare appointment booking mobile app with voice assistance

publish_to: 'none'
version: 1.0.0+1

# Healthcare app metadata
homepage: https://medibook.healthcare
repository: https://github.com/medibook/mobile
issue_tracker: https://github.com/medibook/mobile/issues

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  http: ^1.2.0
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Voice Input
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.3
  
  # Calendar
  table_calendar: ^3.0.9
  
  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
